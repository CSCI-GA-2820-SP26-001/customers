---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint
spec:
  description: Run flake8 and pylint via the project Makefile.
  workspaces:
    - name: source
      description: Workspace containing the cloned source code.
  steps:
    - name: run-lint
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -e
        echo "Installing system dependencies..."
        apt-get update -qq && apt-get install -y -qq --no-install-recommends make
        echo "Installing system dependencies..."
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          gcc libpq-dev make
        echo "Installing Python dependencies..."
        pip install --upgrade pip pipenv
        pipenv install --system --dev
        echo "Running lint checks..."
        make lint
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tests
spec:
  description: Run pytest with coverage via the project Makefile.
  workspaces:
    - name: source
      description: Workspace containing the cloned source code.
  sidecars:
    - name: postgres
      image: postgres:15-alpine
      env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: testdb
      readinessProbe:
        exec:
          command: ["pg_isready", "-U", "postgres"]
        initialDelaySeconds: 5
        periodSeconds: 5
  steps:
    - name: run-tests
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: DATABASE_URI
          value: "postgresql+psycopg://postgres:postgres@localhost:5432/testdb"
      script: |
        #!/usr/bin/env bash
        set -e
        echo "Installing system dependencies for psycopg..."
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          gcc libpq-dev make postgresql-client
        echo "Installing Python dependencies..."
        pip install --upgrade pip pipenv
        pipenv install --system --dev
        echo "Waiting for postgres sidecar..."
        until pg_isready -h localhost -U postgres 2>/dev/null; do sleep 1; done
        echo "Running tests..."
        make test
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy
spec:
  description: Apply Kubernetes manifests from the k8s/ folder to the cluster.
  workspaces:
    - name: source
      description: Workspace containing the cloned source code.
  params:
    - name: image
      type: string
      description: Image reference to deploy.
  steps:
    - name: apply-manifests
      image: quay.io/openshift/origin-cli:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -e
        echo "Deploying image $(params.image) to cluster..."
        oc apply -R -f k8s/
        echo "Deployment manifests applied."
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bdd
spec:
  description: Run Behave BDD tests against the deployed service.
  workspaces:
    - name: source
      description: Workspace containing the cloned source code.
  params:
    - name: base-url
      type: string
      description: Base URL of the deployed service (e.g. http://customers).
  steps:
    - name: run-bdd
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: BASE_URL
          value: $(params.base-url)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Installing system dependencies..."
        apt-get update -qq && apt-get install -y -qq --no-install-recommends gcc libpq-dev make
        echo "Installing Python dependencies..."
        pip install --upgrade pip pipenv
        pipenv install --system --dev

        echo "Waiting for service to be ready at ${BASE_URL}..."
        python - <<'PY'
        import os
        import time
        import sys
        import requests

        base_url = os.environ["BASE_URL"].rstrip("/")
        url = f"{base_url}/health"
        deadline = time.time() + 180

        while time.time() < deadline:
            try:
                r = requests.get(url, timeout=5)
                if r.status_code == 200:
                    print(f"Service healthy: {url}")
                    sys.exit(0)
                print(f"Not ready ({r.status_code}): {url}")
            except Exception as e:  # noqa: BLE001
                print(f"Not ready: {e}")
            time.sleep(5)

        raise SystemExit(f"Timed out waiting for {url}")
        PY

        echo "Running BDD tests with BASE_URL=${BASE_URL}..."
        make bdd
